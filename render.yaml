# render.yaml — Crowd FAQ deployment blueprint
# Docs: https://render.com/docs/yaml

# ── Global defaults ──────────────────────────────────────────────────────
services:
  # ── Backend API ──────────────────────────────────────────────────────────
  - name: crowd-faq-backend
    plan: free
    region: singapore       # closest to India; change if needed
    runtime: node
    buildCommand: npm install
    startCommand: npm start

    # Environment variables (secret values set in Render dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set in Render dashboard as a secret
      - key: JWT_SECRET
        sync: false          # set in Render dashboard as a secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        # Fill in after frontend deploys — e.g. https://crowd-faq-frontend.onrender.com
        sync: false
      - key: LLM_API_KEY
        sync: false          # OpenAI key for cloud LLM (required for production)
      - key: LLM_PROVIDER
        value: openai        # or "anthropic", "ollama" (only if self-hosting GPU)
      - key: LLM_MODEL
        value: gpt-4o-mini   # change to your preferred model

    # Health check — Render pings this to keep service alive
    healthCheckPath: /api/health

  # ── Frontend (static) ────────────────────────────────────────────────────
  - name: crowd-faq-frontend
    plan: free
    region: singapore
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      - key: VITE_API_URL
        # Points to backend — update after backend is deployed
        value: https://crowd-faq-backend.onrender.com
      - key: VITE_GITHUB_USERNAME
        value: Nancypaul08

# ── Notes ──────────────────────────────────────────────────────────────────
#
# 1. SIGN UP at https://render.com (free tier is sufficient to start)
#
# 2. MONGODB ATLAS SETUP:
#    - Create free cluster at https://cloud.mongodb.com
#    - Whitelist IP 0.0.0.0/0 (or Render's IP ranges)
#    - Copy connection string → set as MONGO_URI in Render dashboard
#
# 3. LLM PROVIDER (required — Render doesn't have GPU for Ollama):
#    Option A — OpenAI (easiest):
#      LLM_PROVIDER=openai, LLM_MODEL=gpt-4o-mini, LLM_API_KEY=sk-...
#    Option B — Anthropic:
#      LLM_PROVIDER=anthropic, LLM_MODEL=claude-3-haiku-20240307, LLM_API_KEY=sk-ant-...
#    The ollama.js service needs updating to call the chosen provider.
#
# 4. DEPLOY STEPS:
#    a. Push this render.yaml + project to GitHub
#    b. In Render dashboard → "New" → "Blueprint"
#    c. Connect GitHub repo, set env vars in the UI
#    d. Deploy both services together
#
# 5. CORS: Update server/index.js origin to your frontend URL after deploy
#
# 6. To avoid Ollama code changes, update server/services/ollama.js to
#    route to OpenAI/Anthropic when LLM_PROVIDER is not "ollama"